<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-api-base" content="">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>BIZORA Mobile</title>
  <link rel="stylesheet" href="/static/mobile.css?v=2.5">
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <header class="login-menu-row">
      <div class="login-menu-actions">
        <div class="file-menu-wrap">
          <button id="fileMenuBtn" class="file-menu-btn" type="button">File</button>
          <div id="fileMenuPanel" class="file-menu-panel hidden">
            <button id="openCompaniesBtn" class="file-menu-item" type="button">Open Companies</button>
          </div>
        </div>
        <button id="loginThemeToggleBtn" class="icon-btn login-theme-btn" type="button" aria-label="Toggle color mode">&#9790;</button>
      </div>
    </header>
    <div class="login-body">
      <section class="login-card">
        <div class="login-logo-row">
          <div id="loginLogoBox" class="login-logo-box" role="button" tabindex="0" aria-label="Brand logo">
            <img src="/static/app_logo_mobile.png?v=2.5" alt="BIZORA" class="login-logo-image" width="540" height="480" draggable="false">
          </div>
          <button id="secretFileBtn" class="secret-file-btn hidden" type="button" aria-label="Secret companies">
            <img src="/static/file.svg" alt="" class="secret-file-icon">
          </button>
        </div>
        <div id="loginCompanyName" class="login-company-name">No active company selected</div>
        <div id="loginCompanyHint" class="login-company-hint">Use File &gt; Open Companies to select a company.</div>
        <form id="loginForm" class="login-form" autocomplete="off">
          <div class="field">
            <label for="loginUsername">Username</label>
            <select id="loginUsername" required></select>
          </div>
          <div class="field">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" placeholder="Password" required>
          </div>
          <div class="field">
            <label for="loginDate">Date</label>
            <input id="loginDate" type="date" required>
          </div>
          <button id="loginSubmitBtn" class="login-submit-btn" type="submit" disabled>Login</button>
        </form>
      </section>
    </div>
  </div>

  <div id="app" class="app-shell hidden">
    <header class="topbar">
      <button id="navBackBtn" class="icon-btn hidden" type="button" aria-label="Back">&#8592;</button>
      <div class="brand-block">
        <img src="/static/app_logo_mobile.png?v=2.5" alt="BIZORA" class="brand-logo" width="120" height="48">
        <div class="brand-text-block">
          <div id="brandCompanyName" class="brand-company-name"></div>
          <div id="pageSubtitle" class="brand-subtitle hidden"></div>
        </div>
      </div>
      <button id="logoutBtn" class="icon-btn" type="button" aria-label="Log out">&#9099;</button>
      <button id="themeToggleBtn" class="icon-btn" type="button" aria-label="Toggle color mode">&#9790;</button>
    </header>

    <nav class="tabbar">
      <button class="tab-btn active" data-view="dashboard" type="button">Dashboard</button>
      <button class="tab-btn" data-view="books" type="button">Books</button>
      <button class="tab-btn" data-view="reports" type="button">Reports</button>
    </nav>

    <main id="mainContent" class="main-content"></main>
    <div id="toast" class="toast hidden"></div>
  </div>

  <div id="companyModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-header">
        <div id="companyModalTitle" class="modal-title">Open Companies</div>
        <button id="companyModalClose" class="icon-btn" type="button" aria-label="Close">&#10005;</button>
      </div>
      <div id="companyModalList" class="company-list"></div>
    </div>
  </div>

  <script src="/static/mobile.js?v=2.8"></script>
</body>
</html>
